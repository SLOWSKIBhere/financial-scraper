<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financial Intelligence Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
  
  header { background: #0d1117; border-bottom: 1px solid #1e293b; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 1.2rem; font-weight: 700; color: #38bdf8; letter-spacing: -0.5px; }
  .logo span { color: #64748b; }
  .stats-bar { display: flex; gap: 24px; }
  .stat { text-align: center; }
  .stat-num { font-size: 1.3rem; font-weight: 700; color: #38bdf8; }
  .stat-label { font-size: 0.65rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

  .hero { padding: 40px 32px 24px; }
  .hero h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; color: #f1f5f9; }
  .hero p { color: #64748b; margin-top: 6px; font-size: 0.9rem; }
  .last-updated { display: inline-block; background: #1e293b; color: #38bdf8; font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; margin-top: 10px; }

  .filters { padding: 0 32px 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .filter-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover, .filter-btn.active { background: #38bdf8; border-color: #38bdf8; color: #0a0a0f; font-weight: 600; }

  .grid { padding: 0 32px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  
  .card { background: #0d1117; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; transition: border-color 0.2s, transform 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
  .card:hover { border-color: #38bdf8; transform: translateY(-2px); }
  
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .source-badge { font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .category-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; }
  
  .card h3 { font-size: 0.95rem; font-weight: 600; line-height: 1.4; color: #f1f5f9; margin-bottom: 8px; }
  .card p { font-size: 0.82rem; color: #64748b; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .card-footer { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }
  .card-date { font-size: 0.72rem; color: #475569; }
  .card-link { font-size: 0.72rem; color: #38bdf8; font-weight: 500; }

  .score-bar { height: 3px; background: #1e293b; border-radius: 2px; margin-top: 12px; }
  .score-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #38bdf8, #818cf8); }

  .signal-high { border-left: 3px solid #22c55e; }
  .signal-med { border-left: 3px solid #f59e0b; }
  .signal-low { border-left: 3px solid #1e293b; }

  .empty { padding: 60px 32px; text-align: center; color: #334155; }
  .empty h2 { font-size: 1.5rem; margin-bottom: 8px; }

  /* Category colors */
  .cat-crypto { background: #1e1b4b; color: #818cf8; }
  .cat-macro { background: #1a2e1a; color: #4ade80; }
  .cat-earnings { background: #2d1b1b; color: #f87171; }
  .cat-policy { background: #1e2a3a; color: #38bdf8; }
  .cat-markets { background: #2d2416; color: #fb923c; }
  .cat-commodities { background: #1e2d1e; color: #86efac; }
  .cat-unknown { background: #1e1e1e; color: #64748b; }

  .loading { padding: 80px 32px; text-align: center; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid #1e293b; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .stats-bar { gap: 12px; }
    .hero { padding: 24px 16px 16px; }
    .filters { padding: 0 16px 16px; }
    .grid { padding: 0 16px 32px; grid-template-columns: 1fr; }
    header { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Financial<span>Intel</span></div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="total-count">—</div><div class="stat-label">Articles</div></div>
    <div class="stat"><div class="stat-num" id="source-count">—</div><div class="stat-label">Sources</div></div>
    <div class="stat"><div class="stat-num" id="high-signal">—</div><div class="stat-label">High Signal</div></div>
  </div>
</header>

<div class="hero">
  <h1>Financial Intelligence</h1>
  <p>Live feed from 15 sources · Auto-synced daily</p>
  <div class="last-updated" id="last-updated">Loading...</div>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" onclick="filterCategory('all')">All</button>
</div>

<div id="main-content">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p style="color:#64748b">Loading articles...</p>
  </div>
</div>

<script>
const SIGNAL_KEYWORDS = ['crash','surge','rally','plunge','soar','collapse','record','crisis','breakout','fed','rate','inflation','earnings','beat','miss','ipo','acquisition','merger','bankruptcy','investigation','sec','fraud','hack','exploit'];
const TICKER_REGEX = /\b([A-Z]{2,5})\b/g;
const CATEGORY_WEIGHT = { crypto: 1.3, earnings: 1.2, policy: 1.1, macro: 1.0, markets: 0.9, commodities: 0.8 };

// Use raw GitHub to load the JSON data
const DATA_URL = 'https://raw.githubusercontent.com/SLOWSKIBhere/financial-scraper/main/financial_report.json';
const COMMUNITY_URL = 'https://raw.githubusercontent.com/SLOWSKIBhere/financial-scraper/main/community_report.json';

let allArticles = [];
let activeCategory = 'all';

function scoreArticle(article) {
  let score = 0;
  const text = ((article.title || '') + ' ' + (article.summary || '')).toLowerCase();
  SIGNAL_KEYWORDS.forEach(kw => { if (text.includes(kw)) score += 2; });
  const tickers = (article.title || '').match(TICKER_REGEX) || [];
  score += tickers.length;
  const catW = CATEGORY_WEIGHT[article.category] || 1.0;
  return Math.round(score * catW);
}

function getSignalClass(score) {
  if (score >= 6) return 'signal-high';
  if (score >= 3) return 'signal-med';
  return 'signal-low';
}

function formatDate(dateStr) {
  if (!dateStr) return 'Unknown date';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch(e) { return dateStr.slice(0,10); }
}

function getCategoryClass(cat) {
  return 'cat-' + (cat || 'unknown').toLowerCase();
}

function guessCategory(article) {
  const text = ((article.title || '') + ' ' + (article.summary || '')).toLowerCase();
  if (/bitcoin|crypto|eth|btc|blockchain|defi|nft|solana|coinbase/.test(text)) return 'crypto';
  if (/fed|inflation|gdp|rate|macro|economy|recession|treasury/.test(text)) return 'macro';
  if (/earnings|revenue|profit|eps|quarterly|guidance|beat|miss/.test(text)) return 'earnings';
  if (/sec|regulation|policy|congress|senate|law|ban|approve/.test(text)) return 'policy';
  if (/stock|market|nasdaq|s&p|dow|equity|index|rally|correction/.test(text)) return 'markets';
  if (/oil|gold|silver|commodity|crude|gas|wheat|copper/.test(text)) return 'commodities';
  return 'markets';
}

function renderArticles(articles) {
  const container = document.getElementById('main-content');
  if (!articles.length) {
    container.innerHTML = '<div class="empty"><h2>No articles found</h2><p>Try a different filter</p></div>';
    return;
  }
  container.innerHTML = '<div class="grid">' + articles.map(a => {
    const score = a.score || 0;
    const cat = a.category || guessCategory(a);
    const scorePercent = Math.min(100, score * 10);
    return `
      <a href="${a.url || '#'}" target="_blank" rel="noopener" class="card ${getSignalClass(score)}">
        <div class="card-header">
          <span class="source-badge" style="background:#1e293b;color:#94a3b8">${(a.source || 'Unknown').slice(0,20)}</span>
          <span class="category-badge ${getCategoryClass(cat)}">${cat}</span>
        </div>
        <h3>${a.title || 'Untitled'}</h3>
        <p>${a.summary || 'No summary available.'}</p>
        <div class="score-bar"><div class="score-fill" style="width:${scorePercent}%"></div></div>
        <div class="card-footer">
          <span class="card-date">${formatDate(a.published || a.fetched_at)}</span>
          <span class="card-link">Read →</span>
        </div>
      </a>`;
  }).join('') + '</div>';
}

function filterCategory(cat) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const filtered = cat === 'all' ? allArticles : allArticles.filter(a => (a.category || guessCategory(a)) === cat);
  renderArticles(filtered);
}

async function loadData() {
  try {
    const [rss, community] = await Promise.allSettled([
      fetch(DATA_URL).then(r => r.json()),
      fetch(COMMUNITY_URL).then(r => r.json())
    ]);

    let articles = [];

    if (rss.status === 'fulfilled') {
      const d = rss.value;
      if (Array.isArray(d)) {
        articles = articles.concat(d);
      } else if (d.results) {
        d.results.forEach(source => {
          (source.articles || []).forEach(a => {
            articles.push({ ...a, source: source.source || a.source });
          });
        });
      }
    }

    if (community.status === 'fulfilled') {
      const d = community.value;
      if (Array.isArray(d)) articles = articles.concat(d);
      else if (d.results) {
        d.results.forEach(source => {
          (source.articles || []).forEach(a => {
            articles.push({ ...a, source: source.source || a.source });
          });
        });
      }
    }

    // Score and sort
    allArticles = articles.map(a => ({ ...a, score: scoreArticle(a), category: a.category || guessCategory(a) }))
      .sort((a, b) => b.score - a.score);

    // Stats
    document.getElementById('total-count').textContent = allArticles.length;
    const sources = new Set(allArticles.map(a => a.source)).size;
    document.getElementById('source-count').textContent = sources;
    const highSignal = allArticles.filter(a => a.score >= 6).length;
    document.getElementById('high-signal').textContent = highSignal;

    // Last updated
    const dates = allArticles.map(a => a.fetched_at || a.published).filter(Boolean).sort().reverse();
    document.getElementById('last-updated').textContent = dates[0] ? '↻ Updated ' + formatDate(dates[0]) : 'Live feed';

    // Build category filters
    const cats = [...new Set(allArticles.map(a => a.category))].filter(Boolean);
    const filtersEl = document.getElementById('filters');
    filtersEl.innerHTML = '<button class="filter-btn active" onclick="filterCategory(\'all\')">All (' + allArticles.length + ')</button>' +
      cats.map(c => `<button class="filter-btn" onclick="filterCategory('${c}')">${c} (${allArticles.filter(a=>a.category===c).length})</button>`).join('');

    renderArticles(allArticles);

  } catch(e) {
    document.getElementById('main-content').innerHTML = '<div class="empty"><h2>⚠️ Could not load articles</h2><p>' + e.message + '</p></div>';
  }
}

loadData();
</script>
</body>
</html>
